<script>
    function renderMachines(sql_data) {
        const container = document.getElementById("machines-container");
        container.innerHTML = "";
        sql_data.forEach(machine => {
            const div = document.createElement("div");
            const localId = `local-pos-${machine.car_number}`;
            const targetId = `target-pos-${machine.car_number}`;
            const state = `status-${machine.car_number}`;

            div.innerHTML = `
                <p>機台 ${machine.car_number}</p>
                <p>電量：</p>
                <p>60%</p>
                <p>速度：</p>
                <p>${machine.line_speed} m/s</p>
                <p>角速度：</p>
                <p>${machine.angle_speed} m/s</p>
                <p>當前位置：</p>
                <p id="${localId}">(11,-02,0)</p>
                <p>目標位置：</p>
                <p id="${targetId}" onclick="editTarget('${targetId}')"> 設定目標 </p>
                <p>狀態：</p>
                <p id="${state}"> 無資料 </p>
                <div class="machine-actions-group">
                    <button class="action-btn primary" onclick="startMoving(${machine.car_number}, '${localId}', '${targetId}')">出發</button>
                    <button class="action-btn danger" onclick="emergencyStop(${machine.car_number})">緊急停止</button>
                </div>
            `;
            container.appendChild(div);
        });
    }

    function loadMachines() {
    fetch("http://" + ros_ip + ":3000/api/data")
        .then(res => res.json())
        .then(sql_data => renderMachines(sql_data))
        .catch(err => console.error("fetch error:", err));
    }

    // 初次載入
    loadMachines();
</script>

<script>
    function sendVelocityControl() {
        const vehicleSelect = document.getElementById("vehicle-select").value;
        const linearSpeed = parseFloat(document.getElementById("linear-speed").value);
        const angularSpeed = parseFloat(document.getElementById("angular-speed").value);

        let targets = [];
        if(vehicleSelect === "6") {
            // 全部車輛
            targets = [1,2,3,4,5];
        } else {
            targets = [parseInt(vehicleSelect)]; 
        }

        // 逐一更新每台車輛
        targets.forEach(car_number => {
            fetch('http://' + ros_ip + ':3000/api/update_machine', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    car_number: Number(car_number),
                    line_speed: linearSpeed,
                    angle_speed: angularSpeed
                })
            })
            .then(res => res.json())
            .then(data => {
                console.log(`車輛${car_number} 更新結果:`, vehicleSelect);
                console.log(`車輛${car_number} 更新結果:`, linearSpeed);
                console.log(`車輛${car_number} 更新結果:`, angularSpeed);
                console.log(`車輛${car_number} 更新結果:`, data);
            })
            .catch(err => console.error('更新錯誤:', err));
        });

        alert("已送出速度指令到選擇的車輛！");
    }
</script>
    <script>
        /* ========================================= */
        /* 全域參數*/
        /* ========================================= */
        let newString = "";
        let draw_function = "";


        /* ========================================= */
        /* 功能選擇 */
        /* ========================================= */
        function selectMode(button) {
            // 1. 把所有按鈕的 active 拿掉
            document.querySelectorAll('.action-btn-function').forEach(btn => {
                btn.classList.remove('active');
            });
            newString = button.name

            // 2. 把點到的按鈕變成 active
            button.classList.add('active');
        }

        /* ========================================= */
        /* ROS的連接 */
        /* ========================================= */
        console.log('ROS IP:', ros_ip);
        const raw = document.getElementById("cam");
        const processed = document.getElementById("cam_processed");
        cam.src = `http://${ros_ip}:8080/stream?topic=/camera_image`;
        cam_processed.src = `http://${ros_ip}:8080/stream?topic=/camera_image_fix`;
        
        const ros = new ROSLIB.Ros({
            // url: "ws://10.50.65.122:9090"
            url: "ws://" + ros_ip + ":9090"
        });

        ros.on('connection', () => { console.log('已連接到 rosbridge'); });
        ros.on('error', (error) => { console.log('連線錯誤: ', error); });
        ros.on('close', () => { console.log('連線關閉'); });

        // 建立 publisher
        const pub = new ROSLIB.Topic({
            ros: ros,
            name: '/web_input',
            messageType: 'std_msgs/String'
        });

        // 建立 subscriber
        const sub = new ROSLIB.Topic({
            ros: ros,
            name: '/web_output',
            messageType: 'std_msgs/String'
        });

        const camera_position_data = new ROSLIB.Topic({
            ros: ros,
            name: '/web_position_data',
            messageType: 'std_msgs/String'
        });

        // 訂閱並接收資料
        sub.subscribe((msg) => {
            console.log("收到來自 esp32 的訊息:", msg.data);

            // 你要在畫面更新也可以，例如：
            const outputDiv = document.getElementById("ros-output");
            if (outputDiv) {
                outputDiv.innerText = msg.data;
            }
            const car_function = msg.data[0];//功能
            const car_number = msg.data[1];//車號
            const car_state = msg.data[2];

            //初始化
            if(car_function == "1"){
                if(car_state == 5){
                    state.innerText = "撞機了";
                    return;
                }
                
                const state = document.getElementById(`status-${car_number}`);
                const localId = document.getElementById(`local-pos-${car_number}`);
                const local_angle = localId.innerText.slice(1,-1).split(",")[2];

                if(local_angle != "0"){
                    draw_init();
                    state.innerText = "初始畫中...";
                }else if(local_angle == "0"){
                    console.log("state.innerText:", state.innerText);
                    state.innerText = "完成初始畫";
                }
            }
        });
        let carData = {};
        let special_car_x;
        let special_car_y;
        let scale_number;
        camera_position_data.subscribe((msg) => {
            const parts = msg.data.split(",");  // ["id", "x_cm", "y_cm", "yaw_deg", "u_pixel", "v_pixel"]

            let car_id = Number(parts[0]);
            let x = Number(parts[1]);
            let y = Number(parts[2]);
            let yaw = Number(parts[3]);
            // 更新 carData
            carData[car_id] = { x, y, yaw,};

            // 如果是 ID>0，更新畫面 div
            if (car_id > 0 && car_id < 6) {
                // console.log("id:", car_id ,"id:", x,"id:", y);
                const outputDiv = document.getElementById(`local-pos-${car_id}`);
                    
                if (outputDiv) {
                    outputDiv.innerText = `${x.toFixed(1)}, ${y.toFixed(1)}, ${yaw.toFixed(1)}`;
                }
                // draw_round(`
            }
            if (car_id == 11) {
                const web_mouse_x = document.getElementById(`mouse_x`);
                const web_mouse_y = document.getElementById(`mouse_y`);
                const mouse_x = document.getElementById(`mouse_camera_x`);
                const mouse_y = document.getElementById(`mouse_camera_y`);

                mouse_x.innerText = x.toFixed(1);
                mouse_y.innerText = y.toFixed(1);
                special_car_x = mouse_x.innerText;
                special_car_y = mouse_y.innerText;
                // 比例轉換
                scale_number_x = 520/mouse_x.innerText;
                scale_number_y = -430/mouse_y.innerText;
            }
        });


        /* ========================================= */
        /* I. 功能1基本控制 */
        /* ========================================= */
        // 發送訊息 (用於快速測試和基礎方向控制)

        let car_number = []; // 存放選中的車輛

        document.addEventListener("DOMContentLoaded", () => {
            const checkboxes = document.querySelectorAll("#vehicle-select-two input[type='checkbox']");
            console.log("good:", car_number);

            checkboxes.forEach((cb) => {
                cb.addEventListener("change", () => {
                    // 收集所有被勾選的值
                    car_number = Array.from(checkboxes)
                                    .filter(c => c.checked)
                                    .map(c => c.value);
                    console.log("目前選擇車輛:", car_number);
                });
            });
        });

        function send_direction(data) {
            if (newString!="1"){
                alert("只有功能一才能使用")
                return
            }

            newString += String(data);
            for (let i = 0; i < car_number.length; i++) {
                newString += car_number[i];  // 將每個車輛號碼接上
                console.log("good:", newString);
            }
            
            const msg = new ROSLIB.Message({ data: newString });
            pub.publish(msg);
            console.log("已發送:", newString);
            newString = "1";
        }

        /* ========================================= */
        /* II. 定點控制 */
        /* ========================================= */
        function editTarget(id) {
            const target = document.getElementById(id);

            let value = prompt("請輸入新的目標位置格式：x,y,angle：", target.innerText.trim());

            // 使用者按取消
            if (value === null) return;

            // 簡單檢查格式
            if (!/^\s*-?\d+\s*,\s*-?\d+\s*,\s*-?\d+\s*$/.test(value)) {
                alert("格式錯誤！請使用 x,y,angle 格式，例如 3,5,90");
                return;
            }

            target.innerText = "(" + value + ")";
        }

        function startMoving(car_number, local, goal) {
            if (newString != "2") {
                alert("只有功能二才能使用");
                return;
            }

            const local_position = document.getElementById(local);
            const goal_position = document.getElementById(goal);

            if (goal_position.innerText.trim() === "設定目標") {
                alert("請先設定目標");
                return;
            }

            const localText = local_position.innerText.trim();
            const goalText = goal_position.innerText.trim();

            // 整理資料
            function extractXY(text) {
                const match = text.match(/\(\s*(-?\d+)\s*,\s*(-?\d+)\s*,\s*(-?\d+)\s*\)/);
                return [parseInt(match[1]), parseInt(match[2]), parseInt(match[3])];
            }

            const [lx, ly, la] = extractXY(localText);
            const [gx, gy, ga] = extractXY(goalText);

            // 正負好轉換
            function encode(n) {
                const sign = n >= 0 ? "0" : "1";     // 正 = 0, 負 = 1
                let absNum = Math.abs(n);           // 絕對值
                // 轉成兩位數，不足補 0
                absNum = absNum.toString().padStart(3, '0');

                return sign + absNum;               // e.g. "0" + "01" → "001"
            }

            const code =
                newString +
                String(car_number) +   // 車號
                encode(lx) + encode(ly) + encode(la) +
                encode(gx) + encode(gy) + encode(ga);

            const msg = new ROSLIB.Message({ data: code });
            pub.publish(msg);

            console.log("已發送:", code);
        }

        //暫停功能
        function emergencyStop(car_number){
            newString = "5"
            newString += String(car_number);
            
            const msg = new ROSLIB.Message({ data: newString });
            pub.publish(msg);
            console.log("已發送:", newString);
            newString = "1";
        }

        /* ========================================= */
        /* III. 功能2繪圖控制 */
        /* ========================================= */
        const canvas = document.getElementById("drawCanvas"); //canvas空間
        const ctx = canvas.getContext("2d"); //那個空間是2D
        const img = document.getElementById("cam");
        const function_three_data = document.getElementById("function_three_data");

        let drawing = false;
        let drawPoints = "";// 送到ros2的參數
        let drawHistory = [];//繪圖歷史紀錄
        let rectState = {
            active: false,
            start: null,
            current: null,
            model: false
        };
        let triState = { 
            active: false, 
            start: null, 
            end: null 
        };
        let database_car_data = {
            x: 0,
            y: 0
        };
        let historynumber = 0; 


        // 建立canvas空間
        function syncCanvas() {
            const rect = img.getBoundingClientRect();
            canvas.style.left = rect.left + "px";
            canvas.style.top = rect.top + "px";
            canvas.width = rect.width;
            canvas.height = rect.height;
        }

        // 畫矩形
        function normalizeRect(p1, p2) {
            return {
                left: Math.min(p1.x, p2.x),
                right: Math.max(p1.x, p2.x),
                top: Math.min(p1.y, p2.y),
                bottom: Math.max(p1.y, p2.y)
            };
        }
        function drawPreviewRect(p1, p2) {
            const r = normalizeRect(p1, p2);

            ctx.strokeStyle = "blue";
            ctx.lineWidth = 2;
            ctx.setLineDash([6, 4]); // 預覽虛線
            ctx.strokeRect(
                r.left,
                r.top,
                r.right - r.left,
                r.bottom - r.top
            );
            ctx.setLineDash([]);
        }

        // 畫三角形
        function normalizeTri(p1, p2) {
                return {
                start: p1,  // 頂點
                end: p2,    // 底邊頂點
                left: Math.min(p1.x, p2.x),
                right: Math.max(p1.x, p2.x),
                top: Math.min(p1.y, p2.y),
                bottom: Math.max(p1.y, p2.y)
            };   
        }

        function drawPreviewTri(p1, p2) {  // p1=start(頂點), p2=end(底邊右頂點)
            ctx.strokeStyle = 'orange';
            ctx.lineWidth = 2;
            ctx.setLineDash([6, 4]);   // 虛線橘色
            ctx.beginPath();
            ctx.moveTo(p1.x, p1.y);           // 頂點
            ctx.lineTo(p2.x, p2.y);           // 底邊右頂點
            //三角形
            // 計算底邊左頂點（與頂點中點垂直，等長）
            const midX = (p1.x + p2.x) / 2;
            const midY = (p1.y + p2.y) / 2;
            const dx = p2.x - p1.x;
            const dy = p2.y - p1.y;
            const perpX = -dy;  // 垂直向量
            const perpY = dx;
            const len = Math.sqrt(perpX * perpX + perpY * perpY);
            const leftX = midX - perpX / len * 80;  // 底邊左頂點（寬度40px）
            const leftY = midY - perpY / len * 80;
            ctx.lineTo(leftX, leftY);
            ctx.closePath();
            ctx.stroke();
            ctx.setLineDash([]);
        }

        //全部的紀錄
        function redrawAll() {

             ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (const item of drawHistory) {
                if (item.type === "rect") {
                    const r = item.data;
                    ctx.strokeRect(
                        r.left,
                        r.top,
                        r.right - r.left,
                        r.bottom - r.top
                    );
                }

                if (item.type === "line") {
                    ctx.beginPath();
                    ctx.moveTo(item.from.x, item.from.y);
                    ctx.lineTo(item.to.x, item.to.y);
                    ctx.stroke();
                }

                if (item.type === 'tri') {
                    // 新增：跟 draw_choose() 一樣的邏輯
                    ctx.save();
                    ctx.strokeStyle = 'orange';
                    ctx.lineWidth = 3;
                    ctx.setLineDash([]);  // 實線

                    const p1 = item.data.start;
                    const p2 = item.data.end;
                    ctx.beginPath();
                    ctx.moveTo(p1.x, p1.y);
                    ctx.lineTo(p2.x, p2.y);

                    const midX = (p1.x + p2.x) / 2;
                    const midY = (p1.y + p2.y) / 2;
                    const dx = p2.x - p1.x;
                    const dy = p2.y - p1.y;
                    const perpX = -dy;
                    const perpY = dx;
                    const len = Math.sqrt(perpX * perpX + perpY * perpY) || 1;
                    const leftX = midX - perpX / len * 80;
                    const leftY = midY - perpY / len * 80;

                    ctx.lineTo(leftX, leftY);
                    ctx.closePath();
                    ctx.stroke();
                    ctx.restore();
                }

            }
        }

        //顯示上下一步的紀錄
        function draw_choose() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < history_number; i++) {
                if (i >= drawHistory.length || !drawHistory[i]) {
                    console.log('跳過無效歷史項目 i=', i);
                    continue;
                }

                const item = drawHistory[i];

                // 矩形：保持你原本的藍色邏輯（最後一筆藍色）
                if (i === history_number - 1) {
                    ctx.strokeStyle = "blue";
                }

                if (item.type === "rect") {
                    const r = item.data;
                    ctx.strokeRect(r.left, r.top, r.right - r.left, r.bottom - r.top);
                }

                if (item.type === "line") {
                    ctx.beginPath();
                    ctx.moveTo(item.from.x, item.from.y);
                    ctx.lineTo(item.to.x, item.to.y);
                    ctx.stroke();
                }

                // 三角形：獨立處理
                if (item.type === 'tri') {
                    ctx.save();
                    ctx.strokeStyle = 'orange';
                    ctx.lineWidth = 3;
                    ctx.setLineDash([]);  // 實線

                    // 用 drawPreviewTri 的計算邏輯（40px寬度）
                    const p1 = item.data.start;
                    const p2 = item.data.end;
                    ctx.beginPath();
                    ctx.moveTo(p1.x, p1.y);
                    ctx.lineTo(p2.x, p2.y);

                    const midX = (p1.x + p2.x) / 2;
                    const midY = (p1.y + p2.y) / 2;
                    const dx = p2.x - p1.x;
                    const dy = p2.y - p1.y;
                    const perpX = -dy;
                    const perpY = dx;
                    const len = Math.sqrt(perpX * perpX + perpY * perpY)|| 1;
                    const leftX = midX - perpX / len * 80;  // 跟預覽一樣的8px
                    const leftY = midY - perpY / len * 80;

                    ctx.lineTo(leftX, leftY);
                    ctx.closePath();
                    ctx.stroke();
                    ctx.restore();
                }


            }
        }

                total_car_date += encodeCoord(local_text_x);
                total_car_date += encodeCoord(local_text_y);
                total_car_date += encodeCoord(goal_text_x);
                total_car_date += encodeCoord(goal_text_y);
            }

            const msg = new ROSLIB.Message({ data: String(total_car_date) });
            pub.publish(msg);
            console.log("3已發送:", total_car_date);
        }

        /* ========================================= */
        /* IV 特殊功能 */
        /* ========================================= */

        /* ========================================= */
        /* IV 登出 */
        /* ========================================= */
        const logoutBtn = document.getElementById("logoutBtn");
        logoutBtn.addEventListener("click", function() {
            localStorage.removeItem("ros_ip");

            window.location.href = "http://" + ros_ip + ":8000/index.html";
        });


        /* ========================================= */
        /* IV 初始畫車子 */
        /* ========================================= */
        function draw_init() {
            const msg = new ROSLIB.Message({ data: String(123) });
            pub.publish(msg);
        }

        // ===== 存正方形到資料庫 =====
        function saveSquareToDB() {
            // 檢查有沒有畫正方形
            if (drawHistory.length === 0 || drawHistory[0].type !== 'rect') {
                alert('請先畫正方形 (功能3 → 畫矩形)');
                return;
            }

            const rectData = drawHistory[0].data;
            const width = document.getElementById("square_x").value;
            const height = document.getElementById("square_y").value;

            // 驗證輸入
            if (!width || !height || width <= 0 || height <= 0) {
                alert('請輸入有效的寬高');
                return;
            }

            // 顯示寬度、高度、日期(月、日)
            const today = new Date();
            const monthDay = `${today.getMonth() + 1}/${today.getDate()}`; 
            const confirmSave = confirm(`正方形完成！\n\n寬度: ${width}px\n高度: ${height}px\n日期: ${monthDay}\n\n是否存入資料庫？`);

            if (!confirmSave) {
                console.log('存檔已取消');
                return;  // 取消就不存檔
            }

            fetch(`http://${ros_ip}:3000/api/create/coordinate_data`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    shape: 'square',
                    describe: `${width}x${height}`,
                    data: rectData,
                    serial_number: Date.now() % 10000
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    alert('存檔成功！ID: ' + data.id);
                    loadShapeHistory();  // 自動刷新歷史表格
                } else {
                    alert('❌ ' + data.message);
                }
            })
            .catch(err => {
                alert('連線失敗');
                console.error('存檔錯誤:', err);
            });
        }


        // ===== 載入歷史紀錄到現有表格 =====

        function formatDate(dateInput) {
               // 1. 完全沒資料直接回傳
            if (!dateInput) return '—';

            let dateString;
            if (typeof dateInput === 'object') {
                // 新格式：{top:0, left:75, ...}
                dateString = '座標資料';
            } else if (typeof dateInput === 'string') {
                // 舊格式：字串或 null
                dateString = dateInput ? dateInput.substring(0, 10) : '舊資料';
            } else {
                dateString = String(dateInput);
            }

            // 簡單日期處理（如果有完整日期字串）
            if (dateString.includes('-') || dateString.includes('/')) {
                const date = new Date(dateString);
                if (!isNaN(date.getTime())) {
                    return `${date.getMonth() + 1}/${date.getDate()}`;
                }
            }

            return dateString.substring(0, 10) || '最近';
        }


        function loadShapeHistory() {
            console.log('載入歷史，ros_ip:', ros_ip);

            const tbody = document.getElementById('historyTbody');
            if (!tbody) {
                console.error('找不到 historyTbody');
                return;
            }

            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">載入中...</td></tr>';

            fetch(`http://${ros_ip}:3000/api/query/coordinate_data`)
                .then(res => res.json())
                .then(data => {
                    console.log('API資料筆數:', data.data.length);

                    if (!data.success || !data.data || data.data.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#666;">暫無歷史紀錄</td></tr>';
                        return;
                    }

                    // 最安全寫法：逐行建立 DOM
                    tbody.innerHTML = '';
                    data.data.forEach(function (item) {
                        // 解析尺寸：'450x200' → x=450, y=200
                        const match = item.description.match(/(\d+)x(\d+)/);
                        const hx = match ? parseInt(match[1]) : 0;
                        const hy = match ? parseInt(match[2]) : 0;

                        // 用安全的日期格式化
                        const monthDay = item.id ? `#${item.id}` : '無日期';

                        // 建立每一行
                        const row = tbody.insertRow();
                        row.innerHTML = `
                              <td>${monthDay}</td>
                              <td>${hx}</td>
                              <td>${hy}</td>
                              <td>${item.description}</td>
                              <td><button onclick="setValueFromHistory(this)">設定</button></td>
                            `;

                    });

                    console.log('完成！顯示', data.data.length, '筆資料');

                    // 確保表格顯示
                    tbody.style.display = 'table-row-group';
                    const card = document.getElementById('shape_control_card');
                    if (card) card.style.display = 'block';

                })
                .catch(function (err) {
                    console.error('錯誤:', err);
                    tbody.innerHTML = '<tr><td colspan="5" style="color:#f00;">載入失敗</td></tr>';
                });

            // console.log('API資料筆數:', data.data.length);
            // console.log('完成！顯示', data.data.length, '筆資料');

        }

        // 自動載入
        window.addEventListener('load', function () {
            // 延遲1秒載入，避免其他初始化衝突
            setTimeout(function () {
                loadShapeHistory();
            }, 1000);
        });


        function setValueFromHistory(button) {

            // 從按鈕往上找第2個 <td>（x 值）和第3個 <td>（y 值）
            const row = button.closest('tr');
            const cells = row.querySelectorAll('td');
            const hx = parseInt(cells[1].textContent);
            const hy = parseInt(cells[2].textContent);

            // 確保全域變數存在
            if (typeof database_car_data === 'undefined') {
                database_car_data = {};
            }
            database_car_data.x = hx;
            database_car_data.y = hy;

            // 填入表單
            const xInput = document.getElementById('square_x');
            const yInput = document.getElementById('square_y');
            if (xInput) xInput.value = hx;
            if (yInput) yInput.value = hy;

            alert('已設定 x=' + hx + ', y=' + hy);
        }

        function deleteHistory(id) {
            if (!confirm('確定刪除？')) return;

            fetch(`http://${ros_ip}:3000/api/delete/coordinate_data`, {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: id })
            })
                .then(res => res.json())
                .then(() => loadShapeHistory())
                .catch(err => alert('刪除失敗: ' + err));
        }



    </script>
